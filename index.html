<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cecília Peret - Portfólio</title>
  <link rel="stylesheet" href="./output.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center font-sans antialiased">

  <main class="relative bg-slate-800/50 backdrop-blur-sm p-10 rounded-3xl shadow-2xl border border-slate-700/50">

    <div class="absolute top-5 right-5 flex items-center gap-1.5 text-xs font-medium text-slate-400 bg-slate-900/50 px-3 py-1.5 rounded-full border border-slate-700/50 shadow-inner group cursor-default transition-colors hover:bg-slate-800">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-400 group-hover:text-indigo-300 transition-colors"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
      <span class="contador tracking-wide">...</span>
    </div>
    
    <img src="./public/cecilia.jpeg" class="w-32 h-32 rounded-full object-cover mx-auto mb-6 shadow-lg group-hover:scale-105 transition-transform duration-300 border-4 border-indigo-500/30">

    <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400 mb-2">
      Cecília Peret
    </h1>

    <h2 class="text-xl font-medium text-slate-300 mb-6 tracking-wide">
      Desenvolvedora Web
    </h2>

    <div class="inline-flex items-center gap-2 bg-slate-800/80 px-5 py-2.5 rounded-full border border-slate-600/50 shadow-inner">
      <span class="text-lg">🎓</span>
      <span class="text-sm font-semibold text-indigo-300 tracking-wide uppercase">Ciência da Computação</span>
    </div>

  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Fazemos a chamada para a API de contador gratuita
      fetch("https://api.counterapi.dev/v1/ceciliaperet/portfolio/up")
        .then(resposta => resposta.json())
        .then(dados => {
          const contadorEl = document.querySelector(".contador");
          if (contadorEl) {
            // Atualiza o texto com o número de visitas retornado
            contadorEl.innerText = dados.count + " visitas";
          }
        })
        .catch(erro => console.error("Erro ao carregar o contador:", erro));
    });
  </script>
</body>
</html>
